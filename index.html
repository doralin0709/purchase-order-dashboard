<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>採購訂單不足清單</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f,#1a4971);color:#fff;padding:20px 32px 16px}
.header-inner{max-width:1320px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:800;margin:0}
.header .sub{font-size:11px;letter-spacing:3px;color:#93c5fd;font-weight:600;margin-bottom:4px}
.header .desc{font-size:11px;color:#bfdbfe;margin-top:4px}
.stat-cards{display:flex;gap:10px}
.stat-card{text-align:center;border-radius:10px;padding:10px 16px;min-width:76px}
.stat-card .num{font-size:22px;font-weight:800}
.stat-card .lbl{font-size:10px;color:#e2e8f0;margin-top:2px}
.main{max-width:1320px;margin:0 auto;padding:18px 24px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.controls{padding:14px 18px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;font-weight:700;color:#374151;white-space:nowrap}
.threshold-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:#6b7280;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.threshold-btn.active-dc{border-color:#dc2626;background:#fef2f2;color:#dc2626;font-weight:700}
.threshold-btn.active-ea{border-color:#ea580c;background:#fff7ed;color:#ea580c;font-weight:700}
.threshold-btn.active-d9{border-color:#d97706;background:#fffbeb;color:#d97706;font-weight:700}
.threshold-btn.active-gray{border-color:#6b7280;background:#f9fafb;color:#6b7280;font-weight:700}
.search-box{padding:6px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:12px;width:180px;outline:none;font-family:inherit}
.count-badge{font-size:11px;color:#6b7280;white-space:nowrap}
.count-badge b{color:#1e293b}
/* Dropdown */
.dd-wrapper{position:relative}
.dd-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#374151;font-size:12px;cursor:pointer;min-width:140px;font-family:inherit;transition:all .15s}
.dd-btn.active{border-color:#1d4ed8;background:#eff6ff;color:#1d4ed8;font-weight:700}
.dd-arrow{margin-left:auto;font-size:10px;color:#94a3b8}
.dd-menu{position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:220px;padding:6px 0;max-height:360px;overflow-y:auto;display:none}
.dd-menu.open{display:block}
.dd-header{padding:6px 14px 8px;border-bottom:1px solid #f1f5f9;display:flex;gap:8px}
.dd-header button{font-size:11px;color:#6b7280;background:none;border:none;cursor:pointer;padding:0;font-family:inherit}
.dd-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.dd-item:hover{background:#f8fafc}
.dd-item.selected{background:#f0f9ff}
.dd-cb{width:16px;height:16px;border-radius:4px;border:2px solid #d1d5db;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:#fff}
.dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dd-code{font-family:monospace;font-size:12px;font-weight:700;color:#374151;min-width:28px}
.dd-zh{font-size:12px;color:#6b7280;flex:1}
.dd-cnt{font-size:11px;color:#94a3b8;font-weight:600}
/* Tags */
.tag-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px}
.tag .tag-code{font-family:monospace}
.tag .tag-sep{opacity:.6;font-size:10px}
.tag-clear{font-size:11px;color:#6b7280;background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit}
/* Chart */
.chart-card{padding:18px 18px 10px}
.chart-title{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.chart-stripe{width:4px;height:18px;background:#2563eb;border-radius:2px}
.chart-title span{font-size:14px;font-weight:700}
.legend{margin-left:auto;display:flex;gap:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#6b7280}
.legend-dot{width:10px;height:10px;border-radius:2px}
/* Table */
.table-header{padding:12px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.table-stripe{width:4px;height:18px;background:#0ea5e9;border-radius:2px}
.table-title{font-size:14px;font-weight:700}
.export-btn{padding:6px 16px;border-radius:7px;border:none;background:#1d4ed8;color:#fff;font-size:12px;font-weight:700;cursor:pointer;margin-left:auto;font-family:inherit}
.clear-sel-btn{padding:6px 12px;border-radius:7px;border:1.5px solid #e2e8f0;background:#fff;color:#6b7280;font-size:12px;cursor:pointer;font-family:inherit}
.sel-count{font-size:12px;color:#2563eb;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f8fafc;border-bottom:1.5px solid #e2e8f0}
th{padding:9px 10px;font-weight:600;color:#6b7280;white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
th.sorted{color:#1d4ed8}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s}
tbody tr:nth-child(even){background:#f8fafc}
tbody tr.checked{background:#eff6ff;border-left:3px solid #2563eb}
tbody tr:nth-child(even).checked{background:#eff6ff}
td{padding:8px 10px}
td.mono{font-family:monospace;font-weight:600;color:#1d4ed8;white-space:nowrap}
td.desc{color:#475569;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.right{text-align:right}
td.center{text-align:center}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.urg-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
/* Pagination */
.pagination{padding:10px 18px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.pag-info{font-size:11px;color:#6b7280}
.pag-btns{display:flex;gap:4px}
.pag-btn{padding:4px 9px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.pag-btn:disabled{color:#cbd5e1;cursor:not-allowed}
.pag-btn.current{border-color:#1d4ed8;background:#1d4ed8;color:#fff;font-weight:700}
.footer{margin-top:14px;font-size:10px;color:#94a3b8;text-align:center;padding-bottom:32px}
.no-data{text-align:center;padding:40px 0;color:#94a3b8}
.table-overflow{overflow-x:auto}

<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div>
      <div class="sub">廠別 1011 · 進耗存庫存系統</div>
      <h1>採購訂單不足清單</h1>
      <p class="desc">可用月數 = 現有總量 ÷ 最大需求量　｜　現有總量 = 總庫存 + 在外量</p>
    </div>
    <div class="stat-cards">
      <div class="stat-card" style="background:#7f1d1d"><div class="num" id="cnt08" style="color:#fca5a5">-</div><div class="lbl">&lt; 0.8 個月</div></div>
      <div class="stat-card" style="background:#7c2d12"><div class="num" id="cnt1" style="color:#fdba74">-</div><div class="lbl">&lt; 1 個月</div></div>
      <div class="stat-card" style="background:#713f12"><div class="num" id="cnt2" style="color:#fde047">-</div><div class="lbl">&lt; 2 個月</div></div>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Controls -->
  <div class="card controls">
    <div class="filter-row">

          <span class="dd-arrow" id="ddArrow">▼</span>
        </button>
        <div class="dd-menu" id="ddMenu">
          <div class="dd-header">
            <button onclick="clearTypes()">全部</button>
            <span style="color:#e2e8f0">|</span>
            <button onclick="selectAllTypes()">全選</button>
          </div>
          <div id="ddItems"></div>
        </div>
      </div>

      <span class="filter-label" style="margin-left:4px">可用月數：</span>
      <button class="threshold-btn" data-val="0.8" onclick="setThreshold(0.8)">＜ 0.8 個月 <span style="font-size:10px;opacity:.75">緊急缺料</span></button>
      <button class="threshold-btn" data-val="1" onclick="setThreshold(1)">＜ 1 個月 <span style="font-size:10px;opacity:.75">緊急</span></button>
      <button class="threshold-btn active-d9" data-val="2" onclick="setThreshold(2)">＜ 2 個月 <span style="font-size:10px;opacity:.75">需備料</span></button>
      <button class="threshold-btn" data-val="999" onclick="setThreshold(999)">全部顯示</button>

      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <input class="search-box" id="searchBox" placeholder="搜尋料號/描述…" oninput="onSearch()" />
        <span class="count-badge">共 <b id="countBadge">-</b> 筆</span>
      </div>
    </div>
    <div id="tagRow" class="tag-row" style="display:none"></div>
  </div>

  <!-- Chart -->
  <div class="card chart-card">
    <div class="chart-title">
      <div class="chart-stripe"></div>
      <span id="chartTitle">可用月數視覺化</span>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>&lt; 0.8 個月</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ea580c"></div>&lt; 1 個月</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>&lt; 2 個月</div>
      </div>
    </div>
    <canvas id="myChart" height="80"></canvas>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="table-header">
      <div class="chart-stripe"></div>
      <span class="table-title">採購明細清單</span>
      <span id="selCount" class="sel-count" style="display:none"></span>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="clear-sel-btn" id="clearSelBtn" onclick="clearSel()" style="display:none">清除選取</button>
        <button class="export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
      </div>
    </div>
    <div class="table-overflow">
      <table>
        <thead>
          <tr>
            <th style="width:32px"><input type="checkbox" id="chkAll" onchange="toggleAll()"></th>
            <th class="sortable sorted" onclick="sortBy('料號')" id="th-料號">料號 ↑</th>
            <th>描述</th>
            <th>分類</th>
            <th>單位</th>
            <th class="sortable right" onclick="sortBy('現有總量')" id="th-現有總量" style="text-align:right">現有總量</th>
            <th class="sortable right" onclick="sortBy('最大需求量')" id="th-最大需求量" style="text-align:right">最大需求量</th>
            <th class="right sortable" onclick="sortBy('平均月領用')" id="th-平均月領用" style="text-align:right">平均月領用</th>
            <th class="right sortable" onclick="sortBy('實際領用')" id="th-實際領用" style="text-align:right">實際領用</th>
            <th class="right sortable" onclick="sortBy('預估缺口')" id="th-預估缺口" style="text-align:right">預估缺口</th>
            <th class="right sortable sorted" onclick="sortBy('可用月數')" id="th-可用月數" style="text-align:right">可用月數 ↑</th>
            <th>緊急度</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <span class="pag-info" id="pagInfo"></span>
      <div class="pag-btns" id="pagBtns"></div>
    </div>
    <div class="no-data" id="noData" style="display:none">此條件下無資料</div>
  </div>

  <div class="footer">可用月數 = 現有總量 ÷ 最大需求量　｜　最大需求量 = MAX(當月實際領用, 平均月領用量)　｜　現有總量 = 總庫存 + 在外量</div>
</div>

  {"廠別":"1011","料號":"1011TE004A","描述":"15mm/1500M/10kg,1,黃,H1575101,H級全自動打包帶","單位":"ROL","分類":"TE","包材名稱":"膠膜","總庫存":4.0,"在外量":15.0,"現有總量":19.0,"實際領用":0.0,"平均月領用":0.167,"最大需求量":0.167,"預估缺口":-18.833,"可用月數":114.0},
  {"廠別":"1011","料號":"1011LA134A","描述":"1cm,200PC,桔底空白,銅版紙","單位":"EA","分類":"LA","包材名稱":"Label","總庫存":1200.0,"在外量":9000.0,"現有總量":10200.0,"實際領用":0.0,"平均月領用":33.333,"最大需求量":33.333,"預估缺口":-10166.667,"可用月數":306.0},
  {"廠別":"1011","料號":"1011RE002A","描述":"NA,NA,黑色,RD33008RBK,黑軸片","單位":"ROL","分類":"RE","包材名稱":"Reel","總庫存":52.0,"在外量":750.0,"現有總量":802.0,"實際領用":0.0,"平均月領用":0.333,"最大需求量":0.333,"預估缺口":-801.667,"可用月數":2406.0}
];

// ─── Constants ───────────────────────────────────────────────────────────────
const TYPE_META = {
  TR:{zh:"Tray",    color:"#6366f1"},
  LA:{zh:"Label",   color:"#0ea5e9"},
  CA:{zh:"Carrier", color:"#8b5cf6"},
  IB:{zh:"內盒",    color:"#f59e0b"},
  BG:{zh:"鋁箔袋",  color:"#10b981"},
  OB:{zh:"外箱",    color:"#ef4444"},
  TE:{zh:"膠膜",    color:"#f97316"},
  BU:{zh:"泡棉",    color:"#ec4899"},
  RE:{zh:"Reel",    color:"#14b8a6"},
  HD:{zh:"乾燥包",  color:"#84cc16"},
  CO:{zh:"Cover",   color:"#3b82f6"},
  OT:{zh:"碳帶",    color:"#78716c"},
  FB:{zh:"隔板",    color:"#a16207"},
  BA:{zh:"Band",    color:"#be185d"},
  "其他":{zh:"其他",color:"#9ca3af"},
};
const ALL_TYPES = ["CA","TR","LA","IB","BG","OB","CO","RE","TE","BU","HD","BA","FB","OT","其他"];
const URGENCY = [
  {label:"< 0.8 個月", color:"#dc2626", light:"#fee2e2"},
  {label:"< 1 個月",   color:"#ea580c", light:"#ffedd5"},
  {label:"< 2 個月",   color:"#d97706", light:"#fef3c7"},
  {label:"充足",       color:"#16a34a", light:"#dcfce7"},
];
const PAGE_SIZE = 20;

function urgencyOf(m){ return m<0.8?0:m<1?1:m<2?2:3; }
function fmt(n){ if(n===999)return"∞"; return Number.isInteger(n)?n.toLocaleString():parseFloat(n.toFixed(2)).toLocaleString(); }

// ─── State ───────────────────────────────────────────────────────────────────
let threshold = 2;
let selectedTypes = new Set();
let sortCol = "可用月數";
let sortDir = "asc";
let searchQ = "";
let page = 0;
let checkedRows = new Set();
let filtered = [];
let chartInstance = null;

// ─── Header counts ───────────────────────────────────────────────────────────
document.getElementById("cnt08").textContent = ALL_DATA.filter(r=>r.可用月數<0.8).length;
document.getElementById("cnt1").textContent  = ALL_DATA.filter(r=>r.可用月數>=0.8&&r.可用月數<1).length;
document.getElementById("cnt2").textContent  = ALL_DATA.filter(r=>r.可用月數>=1&&r.可用月數<2).length;

// ─── Dropdown ────────────────────────────────────────────────────────────────
function buildDropdown(){
  const typeCounts = {};
  ALL_DATA.filter(r=>r.可用月數<threshold).forEach(r=>{typeCounts[r.分類]=(typeCounts[r.分類]||0)+1;});
  const items = document.getElementById("ddItems");
  items.innerHTML = "";
  ALL_TYPES.filter(t=>typeCounts[t]>0).forEach(t=>{
    const tm = TYPE_META[t]||TYPE_META["其他"];
    const active = selectedTypes.has(t);
    const div = document.createElement("div");
    div.className = "dd-item" + (active?" selected":"");
    div.onclick = ()=>{ toggleType(t); };
    div.innerHTML = `
      <div class="dd-cb" style="border-color:${active?tm.color:"#d1d5db"};background:${active?tm.color:"#fff"}">${active?"✓":""}</div>
      <div class="dd-dot" style="background:${tm.color}"></div>
      <span class="dd-code">${t}</span>
      <span class="dd-zh">${tm.zh}</span>
      <span class="dd-cnt">${typeCounts[t]}</span>
    `;
    items.appendChild(div);
  });
}

function toggleDropdown(){
  const menu = document.getElementById("ddMenu");
  const arrow = document.getElementById("ddArrow");
  menu.classList.toggle("open");
  arrow.textContent = menu.classList.contains("open")?"▲":"▼";
}

document.addEventListener("mousedown", e=>{
  const w = document.getElementById("ddWrapper");
  if(!w.contains(e.target)){
    document.getElementById("ddMenu").classList.remove("open");
    document.getElementById("ddArrow").textContent="▼";
  }
});

function toggleType(t){
  if(selectedTypes.has(t)) selectedTypes.delete(t);
  else selectedTypes.add(t);
  page=0; checkedRows.clear();
  updateDdBtn(); buildDropdown(); renderTags(); render();
}

function clearTypes(){ selectedTypes.clear(); page=0; checkedRows.clear(); updateDdBtn(); buildDropdown(); renderTags(); render(); }
function selectAllTypes(){
  const typeCounts={};
  ALL_DATA.filter(r=>r.可用月數<threshold).forEach(r=>{typeCounts[r.分類]=(typeCounts[r.分類]||0)+1;});
  ALL_TYPES.filter(t=>typeCounts[t]>0).forEach(t=>selectedTypes.add(t));
  page=0; updateDdBtn(); buildDropdown(); renderTags(); render();
}

function updateDdBtn(){
  const btn = document.getElementById("ddBtn");
  const txt = document.getElementById("ddBtnText");
  if(selectedTypes.size===0){ btn.className="dd-btn"; txt.textContent="全部分類"; }
  else { btn.className="dd-btn active"; txt.textContent=`已選 ${selectedTypes.size} 項`; }
}

function renderTags(){
  const row = document.getElementById("tagRow");
  if(selectedTypes.size===0){ row.style.display="none"; return; }
  row.style.display="flex";
  row.innerHTML = '<span style="font-size:11px;color:#94a3b8">已篩選：</span>';
  [...selectedTypes].forEach(t=>{
    const tm=TYPE_META[t]||TYPE_META["其他"];
    const span=document.createElement("span");
    span.className="tag";
    span.style.cssText=`background:${tm.color}18;color:${tm.color};border:1px solid ${tm.color}44`;
    span.innerHTML=`<span class="tag-code">${t}</span><span class="tag-sep">·</span><span>${tm.zh}</span><button onclick="toggleType('${t}')" style="background:none;border:none;color:${tm.color};cursor:pointer;padding:0;font-size:11px;margin-left:2px">✕</button>`;
    row.appendChild(span);
  });
  const clr=document.createElement("button");
  clr.className="tag-clear"; clr.textContent="清除全部";
  clr.onclick=()=>{ clearTypes(); };
  row.appendChild(clr);
}

// ─── Threshold ───────────────────────────────────────────────────────────────
const THRESH_COLORS = {0.8:"dc",1:"ea",2:"d9",999:"gray"};
function setThreshold(v){
  threshold=v; page=0; selectedTypes.clear(); checkedRows.clear();
  document.querySelectorAll(".threshold-btn").forEach(b=>{
    const bv=parseFloat(b.dataset.val);
    b.className="threshold-btn"+(bv===v?" active-"+THRESH_COLORS[bv]:"");
  });
  updateDdBtn(); buildDropdown(); renderTags(); render();
}

// ─── Search ──────────────────────────────────────────────────────────────────
function onSearch(){ searchQ=document.getElementById("searchBox").value; page=0; render(); }

// ─── Sort ────────────────────────────────────────────────────────────────────
function sortBy(col){
  if(sortCol===col) sortDir=sortDir==="asc"?"desc":"asc";
  else{ sortCol=col; sortDir="asc"; }
  page=0; render();
}

// ─── Filter & sort ───────────────────────────────────────────────────────────
function computeFiltered(){
  let d = ALL_DATA.filter(r=>r.可用月數<threshold);
  if(selectedTypes.size>0) d=d.filter(r=>selectedTypes.has(r.分類));
  if(searchQ.trim()){
    const q=searchQ.trim().toLowerCase();
    d=d.filter(r=>r.料號.toLowerCase().includes(q)||r.描述.toLowerCase().includes(q));
  }
  d.sort((a,b)=>{
    const av=a[sortCol],bv=b[sortCol];
    if(typeof av==="string") return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return sortDir==="asc"?av-bv:bv-av;
  });
  return d;
}

// ─── Chart ───────────────────────────────────────────────────────────────────
function renderChart(data){
  const top = [...data].sort((a,b)=>a.可用月數-b.可用月數).slice(0,20);
  document.getElementById("chartTitle").textContent=`可用月數視覺化（最急需前 ${top.length} 項）`;
  const ctx=document.getElementById("myChart").getContext("2d");
  if(chartInstance) chartInstance.destroy();
  if(top.length===0) return;
  chartInstance=new Chart(ctx,{
    type:"bar",
    data:{
      labels:top.map(r=>r.料號),
      datasets:[{
        data:top.map(r=>r.可用月數),
        backgroundColor:top.map(r=>URGENCY[urgencyOf(r.可用月數)].color),
        borderRadius:4,
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:items=>items[0].label,
          label:item=>{
            const r=top[item.dataIndex];
            return[`可用月數: ${r.可用月數.toFixed(2)} 月`,`現有總量: ${fmt(r.現有總量)} ${r.單位}`,`最大需求量: ${fmt(r.最大需求量)} ${r.單位}`];
          }
        }}
      },
      scales:{
        x:{ticks:{font:{family:"monospace",size:10},maxRotation:30},grid:{display:false}},
        y:{grid:{color:"#f1f5f9"},
          afterDataLimits(scale){
            scale.max=Math.max(scale.max,2.2);
          }
        }
      },
      annotation:{annotations:{
        line08:{type:"line",yMin:0.8,yMax:0.8,borderColor:"#dc2626",borderDash:[4,2]},
        line1:{type:"line",yMin:1,yMax:1,borderColor:"#ea580c",borderDash:[4,2]},
        line2:{type:"line",yMin:2,yMax:2,borderColor:"#d97706",borderDash:[4,2]},
      }}
    }
  });
  // Draw reference lines manually
  Chart.register({
    id:"reflines",
    afterDraw(chart){
      const{ctx,chartArea:{left,right},scales:{y}}=chart;
      [[0.8,"#dc2626"],[1,"#ea580c"],[2,"#d97706"]].forEach(([val,color])=>{
        const yPx=y.getPixelForValue(val);
        if(yPx<chart.chartArea.top||yPx>chart.chartArea.bottom) return;
        ctx.save();
        ctx.strokeStyle=color; ctx.lineWidth=1.5;
        ctx.setLineDash([4,3]);
        ctx.beginPath(); ctx.moveTo(left,yPx); ctx.lineTo(right,yPx); ctx.stroke();
        ctx.fillStyle=color; ctx.font="10px sans-serif";
        ctx.fillText(val+"M",right+4,yPx+4);
        ctx.restore();
      });
    }
  });
}

// ─── Table ───────────────────────────────────────────────────────────────────
function renderTable(data){
  const start=page*PAGE_SIZE, rows=data.slice(start,start+PAGE_SIZE);
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  if(rows.length===0){
    document.getElementById("noData").style.display="block";
    document.getElementById("pagination").style.display="none";
    return;
  }
  document.getElementById("noData").style.display="none";

  rows.forEach((r,i)=>{
    const urg=urgencyOf(r.可用月數);
    const meta=URGENCY[urg];
    const tm=TYPE_META[r.分類]||TYPE_META["其他"];
    const isChecked=checkedRows.has(r.料號);
    const tr=document.createElement("tr");
    if(isChecked) tr.className="checked";
    tr.innerHTML=`
      <td class="center"><input type="checkbox" ${isChecked?"checked":""} onchange="toggleCheck('${r.料號}')"></td>
      <td class="mono">${r.料號}</td>
      <td class="desc" title="${r.描述.replace(/"/g,'&quot;')}">${r.描述}</td>
      <td><span class="badge" style="background:${tm.color}22;color:${tm.color}">${tm.zh}</span></td>
      <td class="center" style="color:#6b7280">${r.單位}</td>
      <td class="right" style="color:#0369a1">${fmt(r.現有總量)}</td>
      <td class="right" style="color:#7c3aed">${fmt(r.最大需求量)}</td>
      <td class="right" style="color:#6b7280">${fmt(r.平均月領用)}</td>
      <td class="right" style="color:#6b7280">${fmt(r.實際領用)}</td>
      <td class="right" style="color:${r.預估缺口>0?"#dc2626":"#6b7280"};font-weight:${r.預估缺口>0?700:400}">${fmt(r.預估缺口)}</td>
      <td class="right" style="color:${meta.color};font-weight:700;font-size:13px">${r.可用月數===999?"∞":r.可用月數.toFixed(2)}</td>
      <td><span class="urg-badge" style="background:${meta.light};color:${meta.color}">${meta.label}</span></td>
    `;
    tbody.appendChild(tr);
  });

  // Pagination
  const totalPages=Math.ceil(data.length/PAGE_SIZE);
  const pag=document.getElementById("pagination");
  if(totalPages<=1){ pag.style.display="none"; return; }
  pag.style.display="flex";
  document.getElementById("pagInfo").textContent=`第 ${page+1} / ${totalPages} 頁　共 ${data.length} 筆`;
  const btns=document.getElementById("pagBtns");
  btns.innerHTML="";
  [["«",()=>setPage(0)],["‹",()=>setPage(Math.max(0,page-1))]]
    .forEach(([t,fn])=>{ const b=document.createElement("button"); b.className="pag-btn"; b.textContent=t; b.disabled=page===0; b.onclick=fn; btns.appendChild(b); });
  const lo=Math.max(0,Math.min(page-2,totalPages-5));
  for(let p=lo;p<Math.min(lo+5,totalPages);p++){
    const b=document.createElement("button"); b.className="pag-btn"+(p===page?" current":""); b.textContent=p+1;
    b.onclick=(()=>{const pp=p;return()=>setPage(pp)})(); btns.appendChild(b);
  }
  [["›",()=>setPage(Math.min(totalPages-1,page+1))],["»",()=>setPage(totalPages-1)]]
    .forEach(([t,fn])=>{ const b=document.createElement("button"); b.className="pag-btn"; b.textContent=t; b.disabled=page===totalPages-1; b.onclick=fn; btns.appendChild(b); });
}

function setPage(p){ page=p; renderTable(filtered); updateSortHeaders(); updateSelUI(); }

// ─── Sort headers ────────────────────────────────────────────────────────────
function updateSortHeaders(){
  document.querySelectorAll("th[id^='th-']").forEach(th=>{
    const col=th.id.replace("th-","");
    th.className="sortable"+(col===sortCol?" sorted":"")+(["現有總量","最大需求量","平均月領用","實際領用","預估缺口","可用月數"].includes(col)?" right":"");
    th.textContent=col+(col===sortCol?(sortDir==="asc"?" ↑":" ↓"):"");
  });
}

// ─── Checkbox ────────────────────────────────────────────────────────────────
function toggleCheck(料號){ if(checkedRows.has(料號))checkedRows.delete(料號); else checkedRows.add(料號); render(); }
function toggleAll(){
  const pageRows=filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const allC=pageRows.every(r=>checkedRows.has(r.料號));
  if(allC) pageRows.forEach(r=>checkedRows.delete(r.料號));
  else pageRows.forEach(r=>checkedRows.add(r.料號));
  render();
}
function clearSel(){ checkedRows.clear(); render(); }
function updateSelUI(){
  const sc=document.getElementById("selCount");
  const cb=document.getElementById("clearSelBtn");
  const eb=document.querySelector(".export-btn");
  if(checkedRows.size>0){ sc.style.display="inline"; sc.textContent=`已選 ${checkedRows.size} 筆`; cb.style.display="inline"; eb.textContent=`⬇ 匯出 CSV（${checkedRows.size}筆）`; }
  else{ sc.style.display="none"; cb.style.display="none"; eb.textContent=`⬇ 匯出 CSV（${filtered.length}筆）`; }
  const pageRows=filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  document.getElementById("chkAll").checked=pageRows.length>0&&pageRows.every(r=>checkedRows.has(r.料號));
}

// ─── Export CSV ──────────────────────────────────────────────────────────────
function exportCSV(){
  const cols=["廠別","料號","描述","分類","包材名稱","單位","總庫存","在外量","現有總量","實際領用","平均月領用","最大需求量","預估缺口","可用月數"];
  const target=checkedRows.size>0?ALL_DATA.filter(r=>checkedRows.has(r.料號)):filtered;
  const bom="\uFEFF";
  const lines=target.map(r=>cols.map(c=>{ const v=r[c]??""; return String(v).includes(",")?`"${v}"`:v; }).join(","));
  const blob=new Blob([bom+[cols.join(","),...lines].join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="缺料採購清單.csv"; a.click();
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render(){
  filtered=computeFiltered();
  document.getElementById("countBadge").textContent=filtered.length;
  renderChart(filtered);
  renderTable(filtered);
  updateSortHeaders();
  updateSelUI();
}

// ─── Init ────────────────────────────────────────────────────────────────────
buildDropdown();
render();
</script>
</body>
</html>
